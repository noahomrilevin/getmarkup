<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&family=Playfair+Display:ital,wght@0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <div class="markup-sidebar">

    <!-- Header -->
    <header class="markup-header">
      <span class="markup-title">Markup</span>
      <span class="markup-note-count" id="note-count">0 notes</span>
      <button class="toggle-btn" id="markup-toggle" aria-pressed="false">Off</button>
      <button class="icon-btn" id="close-btn" aria-label="Close sidebar">✕</button>
    </header>

    <!-- Activation error hint — shown only when content script can't be reached -->
    <p class="activation-hint" id="activation-hint" aria-live="polite" hidden>Reload the page to activate Markup.</p>

    <!-- Notes list -->
    <div class="markup-notes" id="notes-list" aria-label="Notes" aria-live="polite">
      <div class="empty-state" id="empty-state"></div>
    </div>

    <!-- Brief output panel (shown when Generate AI Brief is clicked) -->
    <div class="brief-panel" id="brief-output" hidden>
      <div class="brief-panel__toolbar">
        <span class="brief-panel__title">AI Brief</span>
        <div class="brief-panel__actions">
          <button class="btn-copy-brief" id="copy-brief">Copy to Clipboard</button>
          <button class="icon-btn" id="close-brief" aria-label="Close brief">✕</button>
        </div>
      </div>
      <pre class="brief-panel__content" id="brief-content"></pre>
    </div>

    <!-- Note form -->
    <div class="markup-form-area">
      <form class="note-form" id="note-form" autocomplete="off">
        <code class="selector-chip" id="selector-display">Hover to preview element</code>

        <div class="note-form__types" role="group" aria-label="Note type">
          <button type="button" class="type-btn type-btn--active" data-type="general" data-tooltip="General observation or note" aria-pressed="true">General</button>
          <button type="button" class="type-btn" data-type="bug" data-tooltip="Something broken or not working" aria-pressed="false">Bug</button>
          <button type="button" class="type-btn" data-type="design" data-tooltip="Visual or layout issue" aria-pressed="false">Design</button>
          <button type="button" class="type-btn" data-type="copy" data-tooltip="Text, wording or content" aria-pressed="false">Copy</button>
          <button type="button" class="type-btn" data-type="question" data-tooltip="Question or decision needed" aria-pressed="false">?</button>
        </div>

        <textarea
          class="note-form__input"
          id="note-input"
          placeholder="Describe the issue… or speak via Wispr Flow"
          rows="3"
          aria-label="Note text"
        ></textarea>
        <span class="save-hint">Cmd+Enter to save</span>
      </form>
    </div>

    <!-- Actions footer -->
    <div class="markup-actions">
      <button class="btn-save" id="save-note" disabled aria-disabled="true">Save Note</button>
      <button class="btn-primary" id="generate-brief" disabled aria-disabled="true">
        Generate AI Brief ↗
      </button>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast" hidden></div>

  </div>

  <script src="sidebar.js"></script>
</body>
</html>
